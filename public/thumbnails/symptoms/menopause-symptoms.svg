      <stop offset="0%" stop-color="#880E4F"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="400" height="220" fill="url(#bg_menopause_symptoms)" rx="14"/>
  <!-- 상단 장식줄 -->
  <rect width="400" height="4" fill="#F48FB1" opacity="0.6"/>
  <!-- 상단 라벨 -->
  <text x="200" y="30" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="11" font-weight="700" fill="#F48FB1" opacity="0.9">⭐ 건강모아 증상 가이드 ⭐</text>
  <!-- 이모지 -->
  <text x="200" y="90" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="52">🌸</text>
  <!-- 증상명 -->
  <text x="200" y="128" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="30" font-weight="900" fill="#FFFFFF" letter-spacing="-0.5">갱년기 증상</text>
  <!-- 후킹 문구 -->
  <text x="200" y="155" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#F48FB1" opacity="0.95">안면홍조부터 수면장애까지</text>
  <!-- 태그 -->
  <text x="200" y="178" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.45">#안면홍조  #폐경  #여성호르몬</text>
  <!-- 하단 구분선 -->
