<svg width="400" height="220" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="bg_neck_pain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#33691E"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="400" height="220" fill="url(#bg_neck_pain)" rx="14"/>
  <!-- 상단 장식줄 -->
  <rect width="400" height="4" fill="#DCEDC8" opacity="0.6"/>
  <!-- 상단 라벨 -->
  <text x="200" y="30" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="11" font-weight="700" fill="#DCEDC8" opacity="0.9">⭐ 건강모아 증상 가이드 ⭐</text>
  <!-- 이모지 -->
  <text x="200" y="90" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="52">🔧</text>
  <!-- 증상명 -->
  <text x="200" y="128" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="30" font-weight="900" fill="#FFFFFF" letter-spacing="-0.5">목 통증</text>
  <!-- 후킹 문구 -->
  <text x="200" y="155" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="13" fill="#DCEDC8" opacity="0.95">일자목인지 목디스크인지 구분</text>
  <!-- 태그 -->
  <text x="200" y="178" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.45">#일자목  #목디스크  #경추</text>
  <!-- 하단 구분선 -->
  <line x1="40" y1="192" x2="360" y2="192" stroke="#FFFFFF" stroke-width="0.5" opacity="0.2"/>
  <!-- 사이트명 -->
  <text x="200" y="210" text-anchor="middle" font-family="Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.35">health.ambitstock.com</text>
</svg>